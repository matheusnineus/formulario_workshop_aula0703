<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário WorkShop</title>
</head>
<body>
    <header>
        <h2>FORMULÁRIO WORKSHOP DO RENASCER</h2>
        <hr>
    </header>
    <form action="">
        <label for="nome">Nome Completo</label>
        <input type="text" name="" id="nome"> <br>
        <label for="email">E-mail</label>
        <input type="email" name="" id="email"> <br>
        <label for="fone">Telefone</label>
        <input type="tel" name="" id="fone"> <br>
        <label for="dn">Data de Nascimento</label>
        <input type="date" name="" id="dn"> <br>
        <label for="curso">Área de Interesse</label>
        <input type="text" name="" id="curso"> <br>
    </form>
</body>
</html>
